<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOUNDWAVE - Music Player</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo"><span class="logo-dot"></span> SOUNDWAVE</div>
  <div class="nav-section">
    <div class="nav-label">Menu</div>
    <div class="nav-item active" onclick="setNav(this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> Beranda
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Cari
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Jelajahi
    </div>
    <div class="nav-item" onclick="setNav(this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Favorit
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Playlist Saya</div>
  </div>
  <div class="playlist-section" id="playlistSidebar"></div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b6b80" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Cari lagu, artis, album...">
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <span style="font-size:12px;color:var(--muted)" id="dateLabel"></span>
      <div class="avatar">A</div>
    </div>
  </div>
  <div class="content">
    <div class="section-title">Halo, selamat <span id="greeting"></span> 🎵</div>
    <div class="featured-row" id="featuredRow"></div>
    <div class="tracks-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="section-title" style="margin:0;font-size:18px">Trending Sekarang</div>
        <span style="font-size:12px;color:var(--accent);cursor:pointer">Lihat semua →</span>
      </div>
      <div class="tracks-grid" id="tracksGrid"></div>
    </div>
  </div>
</main>

<!-- RIGHT PANEL -->
<aside class="right-panel">
  <div class="np-label">Sedang Diputar</div>
  <div class="np-art" id="npArt">🎵</div>
  <div class="np-info">
    <div class="np-title" id="npTitle">Pilih Lagu</div>
    <div class="np-artist" id="npArtist">—</div>
  </div>
  <div class="np-actions">
    <button class="np-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Acak">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
    </button>
    <button class="np-btn" onclick="prevTrack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="play-btn" id="mainPlayBtn" onclick="togglePlay()">
      <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <button class="np-btn" onclick="nextTrack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="np-btn" id="repeatBtn" onclick="toggleRepeat()" title="Ulang">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </button>
  </div>
  <div class="progress-area">
    <div class="time-row">
      <span id="curTime">0:00</span>
      <span id="durTime">0:00</span>
    </div>
    <div class="progress-track" id="progressTrack" onclick="seekTo(event)">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="vol-row">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
    <div class="vol-slider" id="volSlider" onclick="setVolume(event)">
      <div class="vol-fill" id="volFill"></div>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
  </div>
  <div class="queue-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="np-label">Antrian</div>
      <span style="font-size:10px;color:var(--accent);cursor:pointer" onclick="shuffleQueue()">Shuffle</span>
    </div>
    <div class="queue-list" id="queueList"></div>
  </div>
</aside>


  <script src="script.js"></script>
</body>
</html>
