<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonoBeat — Full Track Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar panel">
      <h1>MonoBeat</h1>
      <nav>
        <button class="nav active" data-tab="home">Home</button>
      </nav>
      <p class="hint">Player musik full track dari YouTube. Cari lagu di kolom search di atas.</p>
    </aside>

    <main class="content panel">
      <header class="topbar">
        <label class="search-box">
          <svg viewBox="0 0 24 24"><path d="M15.5 15h-.79l-.28-.27a6 6 0 1 0-.71.71l.27.28v.79L20 21.5 21.5 20l-6-5zM10 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
          <input id="searchInput" type="text" placeholder="Cari lagu di YouTube (contoh: jazz, lofi, piano)..." />
        </label>
        <span id="resultMeta">Cari lagu di kolom search di atas.</span>
      </header>

      <section id="homeSection" class="tab-panel">
        <div class="section-title-row">
          <h2 id="sectionHeading">Recent Play</h2>
        </div>
        <div id="recentGrid" class="recent-grid"></div>
        <ul id="resultsList" class="track-list hidden"></ul>
      </section>
    </main>

    <aside class="player panel">
      <p class="muted">Now Playing</p>
      <div id="cover" class="cover">🎧</div>
      <h3 id="title">Pilih lagu</h3>
      <p id="artist" class="muted">-</p>

      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <input id="progress" type="range" min="0" max="100" step="0.1" value="0" />

      <div class="controls">
        <button id="shuffleBtn" class="icon-btn" aria-label="shuffle">⤮</button>
        <button id="prevBtn" class="icon-btn" aria-label="previous">⏮</button>
        <button id="playBtn" class="play-btn" aria-label="play pause">▶</button>
        <button id="nextBtn" class="icon-btn" aria-label="next">⏭</button>
        <button id="repeatBtn" class="icon-btn" aria-label="repeat">↻</button>
      </div>

      <label class="volume">
        <span class="muted">Volume</span>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.9" />
      </label>
    </aside>
  </div>

  <audio id="audio"></audio>
  <script src="script.js"></script>
</body>
</html>
